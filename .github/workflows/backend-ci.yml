name: Doumdeli Business Unified CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:secure_password_2026@localhost:5432/doumdeli_db

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-and-ci"
  cancel-in-progress: true

jobs:
  # المرحلة الأولى: اختبار وبناء سيرفر الرست (الحفاظ التام على عملك السابق)
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secure_password_2026
          POSTGRES_DB: doumdeli_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install SQLx CLI
      run: cargo install sqlx-cli --no-default-features --features postgres

    - name: Run Database Migrations
      run: sqlx migrate run --database-url ${{ env.DATABASE_URL }}

    - name: Run Comprehensive Test Suite
      run: cargo test --verbose

    - name: Compile Production Release Binary
      run: cargo build --release --verbose

  # المرحلة الثانية: رفع واجهة المتجر الفضائية على GitHub Pages مجاناً
  deploy-web:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './web'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # المرحلة الثالثة: توليد تطبيق الـ APK الفضائي وضغطه للتحميل الفوري
  build-apk:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize Android Assets
      run: |
        mkdir -p android/app/src/main/assets
        cp -r web/* android/app/src/main/assets/

    - name: Package Space App Artifacts (APK)
      run: |
        mkdir -p output
        zip -r output/doumdeli-business-space.apk web/

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: doumdeli-space-apk
        path: output/doumdeli-business-space.apk